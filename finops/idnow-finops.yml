description: >-
  FinOps view of IDnow spend. IDnow bills identity-verification usage under a
  sales-led contract rather than published self-service rates. Costs are
  typically driven by completed identifications per product (AutoIdent,
  VideoIdent), with eID and eSign as additional contracted services. Because
  no public per-transaction pricing is available, the cost figures here are
  not reconciled and should be confirmed with IDnow.
notes: >-
  Per-identification and per-signature rates are contract-specific and not
  published; verify against the IDnow agreement during reconciliation.
sources:
- https://www.idnow.io/
