meters:
- name: autoident_identifications
  description: Completed automated (AutoIdent) identifications, billed per identification per contract.
  unit: identifications
  aggregation: sum
  dimensions:
  - company
  - product
- name: videoident_identifications
  description: Completed human-assisted (VideoIdent) identifications, billed per identification per contract.
  unit: identifications
  aggregation: sum
  dimensions:
  - company
  - product
- name: esign_signatures
  description: Electronic signatures (AES/QES) issued via eSign, billed per signature per contract.
  unit: signatures
  aggregation: sum
  dimensions:
  - company
  - product
principles:
- name: Visibility
  description: Reconcile completed identifications per product against IDnow invoices and contract terms.
- name: Allocation
  description: Tag transactions per workload/team to map identification spend to internal cost centers.
- name: Optimization
  description: Route eligible flows to AutoIdent where automated verification is sufficient to reduce per-ident cost vs. human VideoIdent.
- name: Accountability
  description: Assign owners per onboarding flow; review identification volume and spend monthly against budget.
